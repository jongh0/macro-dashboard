<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Dashboard - 거시경제 차트</title>
  <meta name="description" content="거시경제 지표 대시보드: 인플레이션, 금리, 시장 심리 등" />

  <!-- ECharts (차트 라이브러리) -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <!-- 스타일 -->
  <link rel="stylesheet" href="./css/style.css" />
  <!-- 테마 초기화 (FOUC 방지: CSS 로드 전에 data-theme 적용) -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- ── 헤더 ─────────────────────────────── -->
  <header class="header">
    <a class="header-logo" href="#">
      <div class="logo-icon">M</div>
      <div>
        <div class="header-title">Macro Dashboard</div>
        <div class="header-subtitle">거시경제 지표 대시보드</div>
      </div>
    </a>

    <div class="header-spacer"></div>

    <div class="header-time">
      <span class="data-date-label">업데이트</span>
      <span id="data-date">—</span>
    </div>

    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
  </header>

  <!-- ── 컨트롤 바 ──────────────────────────── -->
  <div class="controls">
    <!-- 기간 선택 -->
    <div class="range-group">
      <button class="range-btn" data-range="1M">1M</button>
      <button class="range-btn" data-range="3M">3M</button>
      <button class="range-btn" data-range="6M">6M</button>
      <button class="range-btn active" data-range="1Y">1Y</button>
      <button class="range-btn" data-range="3Y">3Y</button>
      <button class="range-btn" data-range="5Y">5Y</button>
      <button class="range-btn" data-range="MAX">MAX</button>
    </div>

    <div class="controls-spacer"></div>

    <!-- 카테고리 필터 -->
    <div class="category-filter">
      <button class="cat-filter-btn active" data-cat="all">전체</button>
      <button class="cat-filter-btn" data-cat="market">시장</button>
      <button class="cat-filter-btn" data-cat="sentiment">심리</button>
      <button class="cat-filter-btn" data-cat="forex">환율</button>
      <button class="cat-filter-btn" data-cat="commodity">원자재</button>
      <button class="cat-filter-btn" data-cat="rates">금리</button>
      <button class="cat-filter-btn" data-cat="macro">거시경제</button>
      <button class="cat-filter-btn" data-cat="comparison">S&amp;P 비교</button>
    </div>
  </div>

  <!-- ── 메인 컨텐츠 ────────────────────────── -->
  <main class="main-content">
    <div class="chart-grid" id="chart-grid">
      <!-- 차트 카드는 app.js 에서 동적으로 생성 -->
    </div>
  </main>

  <!-- ── 푸터 ──────────────────────────────── -->
  <footer class="site-footer">
    데이터 출처: <a href="https://fred.stlouisfed.org" target="_blank">FRED</a> ·
    <a href="https://finance.yahoo.com" target="_blank">Yahoo Finance</a> ·
    <a href="https://www.cnn.com/markets/fear-and-greed" target="_blank">CNN Fear &amp; Greed</a> ·
    <a href="https://www.finra.org/rules-guidance/key-topics/margin-accounts/margin-statistics" target="_blank">FINRA</a> ·
    <a href="https://shillerdata.com" target="_blank">Shiller P/E</a>
    &nbsp;|&nbsp; <a href="https://github.com/jongh0/macro-dashboard" target="_blank">GitHub</a>
  </footer>

  <!-- ── JavaScript ─────────────────────────── -->
  <script src="./js/config.js"></script>
  <script src="./js/cache.js"></script>
  <script src="./js/normalizer.js"></script>
  <script src="./js/fred-api.js"></script>
  <script src="./js/cnn-api.js"></script>
  <script src="./js/charts/chart-configs.js"></script>
  <script src="./js/charts/chart-factory.js"></script>
  <script src="./js/app.js"></script>

  <script>
    // ── 카테고리 필터 ──────────────────────────────────────────
    document.querySelectorAll('.cat-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.dataset.cat;
        document.querySelectorAll('.chart-card').forEach(card => {
          if (cat === 'all') {
            card.style.display = '';
          } else {
            const config = CHART_CONFIGS.find(c => card.id === `card-${c.id}`);
            card.style.display = (config && config.category === cat) ? '' : 'none';
          }
        });
      });
    });

    // ── 테마 토글 ───────────────────────────────────────────────
    const SUN_ICON  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const MOON_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    function _updateThemeBtn(theme) {
      const btn = document.getElementById('theme-btn');
      if (!btn) return;
      // 다크 모드 → 라이트로 전환 버튼(태양), 라이트 모드 → 다크로 전환 버튼(달)
      btn.innerHTML = theme === 'dark' ? SUN_ICON : MOON_ICON;
      btn.title = theme === 'dark' ? '라이트 모드' : '다크 모드';
    }

    function toggleTheme() {
      const cur  = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      _updateThemeBtn(next);
      if (typeof app !== 'undefined') app._reRenderAll();
    }

    document.addEventListener('DOMContentLoaded', () => {
      _updateThemeBtn(document.documentElement.getAttribute('data-theme') || 'dark');
    });
  </script>
</body>
</html>
