name: Update Dashboard Data

on:
  schedule:
    # 1시간마다 정각(UTC) 실행
    - cron: '0 * * * *'
  workflow_dispatch:
    # 수동 실행 허용 (Actions 탭에서 Run workflow 클릭)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.USER_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl xlrd yfinance

      - name: Update all data files
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_data.py --all --key "$FRED_API_KEY"

      - name: Commit and push updated data
        run: |
          git config user.name "Jongho Yang"
          git config user.email "jongh0@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: update dashboard data [$(date -u '+%Y-%m-%d %H:%M')]"
            git push
          fi
