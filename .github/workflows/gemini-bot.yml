name: Gemini PR Assistant

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # 1. 자동 코드 리뷰 및 인터랙티브 어시스턴트 (통합 실행)
  gemini:
    # PR이 열리거나 업데이트될 때, 또는 댓글이 '/gemini'로 시작할 때 실행
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/gemini'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 어시스턴트가 코드를 수정하고 푸시할 수 있도록 PAT 사용 권장 (선택 사항)
          token: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}

      - name: Run Gemini CLI Action
        uses: google-github-actions/run-gemini-cli@v0
        with:
          # Google AI Studio API Key (GitHub Secrets에 등록 필요)
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          
          # 실행 모드 설정 (PR 리뷰 또는 사용자 명령 수행)
          # 사용자가 댓글을 남긴 경우 해당 내용을 프롬프트로 사용, 아니면 자동 리뷰 수행
          prompt: |
            ${{ github.event_name == 'issue_comment' 
                && format('You are a senior software engineer assistant. A user has requested the following task on this PR: "{0}". Please research the relevant files and perform the requested task using your tools. Explain your changes briefly.', sed 's/^\/gemini //' <<< github.event.comment.body)
                || 'Review the following git diff for code quality, security, and best practices. Provide feedback in Markdown.' 
            }}

          # YOLO 모드 활성화 (에이전트가 도구를 사용하여 코드를 직접 수정할 수 있게 함)
          approval_mode: yolo

      - name: Commit and Push Changes
        if: github.event_name == 'issue_comment'
        run: |
          git config user.name "Gemini Bot"
          git config user.email "gemini-bot@google.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "chore: Gemini Assistant applied requested changes"
            git push
          fi
