name: Gemini PR Assistant

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # 1. 자동 코드 리뷰 (PR 오픈/업데이트 시)
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Generate Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # PR 변경 사항 추출
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          
          # Gemini CLI로 리뷰 생성 (Headless 모드)
          # --approval-mode=yolo는 필요 없으나, 단순 텍스트 생성을 위해 사용
          gemini "Review the following git diff for code quality, security vulnerabilities, and best practices. Provide your feedback in Markdown format, categorized by 'Critical', 'Suggestions', and 'Positive' aspects. Diff: $(cat pr_diff.txt)" > review.md

      - name: Post Review Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-file: review.md

  # 2. 인터랙티브 어시스턴트 (댓글로 명령 수행)
  assistant:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/gemini')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR Info
        id: pr_info
        run: |
          # PR 정보를 API로 가져와서 브랜치 이름 확인
          PR_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" ${{ github.event.issue.pull_request.url }})
          echo "head_ref=$(echo $PR_DATA | jq -r .head.ref)" >> $GITHUB_OUTPUT
          echo "base_ref=$(echo $PR_DATA | jq -r .base.ref)" >> $GITHUB_OUTPUT
          echo "repo_full_name=$(echo $PR_DATA | jq -r .head.repo.full_name)" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Execute Agent Task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 사용자의 댓글 내용 추출 (명령어 제외)
          PROMPT=$(echo "${{ github.event.comment.body }}" | sed 's/^\/gemini //')
          
          # Agent Mode (YOLO)로 실행하여 코드 수정 및 조사 수행
          # PR 컨텍스트를 제공하여 변경 사항을 인지하게 함
          gemini "You are a senior software engineer assistant. A user has requested the following task on this PR: '$PROMPT'. The PR targets '${{ steps.pr_info.outputs.base_ref }}' from '${{ steps.pr_info.outputs.head_ref }}'. Please research the relevant files and perform the requested task (e.g., refactoring, fixing bugs, adding tests) using your tools. If changes are made, explain what you did briefly." --approval-mode=yolo > agent_log.md

      - name: Commit and Push Changes
        run: |
          git config user.name "Gemini Bot"
          git config user.email "gemini-bot@google.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "chore: Gemini Assistant applied requested changes"
            git push origin ${{ steps.pr_info.outputs.head_ref }}
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Post Completion Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### Gemini Assistant Task Completed 🚀
            
            ${{ env.CHANGED == 'true' && '✅ I have applied the requested changes to the branch.' || 'ℹ️ I processed the request but no code changes were necessary.' }}
            
            **Details:**
            $(cat agent_log.md)
