name: Gemini Assistant

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # 1. PR 리뷰 및 인터랙티브 어시스턴트
  pr-handler:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/gemini'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}

      - name: Run Gemini CLI Action
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # PR 오픈 시에는 리뷰를 수행하고, 댓글 명령 시에는 해당 태스크 수행 (결과는 한글로 작성)
          prompt: |
            ${{ github.event_name == 'pull_request' 
                && '다음 git diff를 코드 품질, 보안, 모범 사례 관점에서 리뷰하고 마크다운 형식의 한글로 피드백을 제공해 주세요.' 
                || format('당신은 시니어 소프트웨어 엔지니어입니다. 사용자가 이 PR에 대해 "{0}" 작업을 요청했습니다. 도구를 사용하여 관련 파일을 조사하고 작업을 수행한 후, 변경 사항을 한글로 간략히 설명해 주세요.', sed 's/^\/gemini //' <<< github.event.comment.body)
            }}
          approval_mode: yolo

      - name: Commit and Push Changes (Assistant mode only)
        if: github.event_name == 'issue_comment'
        run: |
          git config user.name "Gemini Bot"
          git config user.email "gemini-bot@google.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "chore: Gemini Assistant applied changes"
            git push
          fi

  # 2. 이슈 분석 및 자동 PR 생성
  issue-handler:
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'gemini') || contains(github.event.issue.title, '[gemini]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}

      - name: Run Gemini CLI Action
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # 이슈 내용을 분석하여 코드 수정 수행 (결과는 한글로 작성)
          prompt: |
            당신은 시니어 소프트웨어 엔지니어입니다. 다음 이슈를 분석하고 저장소의 코드를 수정해 주세요.
            
            이슈 제목: ${{ github.event.issue.title }}
            이슈 내용: ${{ github.event.issue.body }}
            
            관련 파일을 조사하고 수정 또는 기능을 구현한 후, 변경 사항을 한글로 설명해 주세요.
          approval_mode: yolo

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Gemini Bot"
          git config user.email "gemini-bot@google.com"
          
          if [[ -n $(git status -s) ]]; then
            BRANCH_NAME="gemini-fix-issue-${{ github.event.issue.number }}"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "fix: address issue #${{ github.event.issue.number }} via Gemini"
            git push origin "$BRANCH_NAME"
            
            gh pr create \
              --title "Gemini: Fix for Issue #${{ github.event.issue.number }}" \
              --body "This PR was automatically generated by Gemini Assistant to address issue #${{ github.event.issue.number }}. 
              
              **Summary of changes:**
              ${{ github.event.issue.title }}" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "No changes were made by Gemini."
          fi
