name: Gemini Assistant

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # 1. PR 리뷰 및 인터랙티브 어시스턴트
  pr-handler:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/gemini'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}

      - name: Run Gemini CLI Action
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # PR 오픈 시에는 리뷰를 수행하고, 댓글 명령 시에는 해당 태스크 수행
          prompt: |
            ${{ github.event_name == 'pull_request' 
                && 'Review the following git diff for code quality, security, and best practices. Provide feedback in Markdown.' 
                || format('You are a senior software engineer. A user requested: "{0}" on this PR. Research and perform the task using your tools. Briefly explain your changes.', sed 's/^\/gemini //' <<< github.event.comment.body)
            }}
          approval_mode: yolo

      - name: Commit and Push Changes (Assistant mode only)
        if: github.event_name == 'issue_comment'
        run: |
          git config user.name "Gemini Bot"
          git config user.email "gemini-bot@google.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "chore: Gemini Assistant applied changes"
            git push
          fi

  # 2. 이슈 분석 및 자동 PR 생성
  issue-handler:
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'gemini') || contains(github.event.issue.title, '[gemini]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}

      - name: Run Gemini CLI Action
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # 이슈 내용을 분석하여 코드 수정 수행
          prompt: |
            You are a senior software engineer. Analyze the following issue and implement the necessary code changes in the repository.
            
            Issue Title: ${{ github.event.issue.title }}
            Issue Body: ${{ github.event.issue.body }}
            
            Research the relevant files, apply the fix or feature, and explain your changes.
          approval_mode: yolo

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.USER_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Gemini Bot"
          git config user.email "gemini-bot@google.com"
          
          if [[ -n $(git status -s) ]]; then
            BRANCH_NAME="gemini-fix-issue-${{ github.event.issue.number }}"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "fix: address issue #${{ github.event.issue.number }} via Gemini"
            git push origin "$BRANCH_NAME"
            
            gh pr create \
              --title "Gemini: Fix for Issue #${{ github.event.issue.number }}" \
              --body "This PR was automatically generated by Gemini Assistant to address issue #${{ github.event.issue.number }}. 
              
              **Summary of changes:**
              ${{ github.event.issue.title }}" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "No changes were made by Gemini."
          fi
